<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caelus Revival 2020 | Proximity Voice Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <main class="layout">
      <section class="panel" aria-label="Steuerung">
        <p class="eyebrow">Caelus Revival 2020</p>
        <h1>Proximity Voice Chat</h1>
        <p class="lead">
          Spieler in deiner Naehe hoerst du laut, mit groesserer Distanz leiser.
        </p>

        <p id="connectionState" class="status">Nicht verbunden</p>

        <label for="displayName">Anzeigename</label>
        <input id="displayName" type="text" maxlength="24" value="Gast" />

        <button id="joinBtn" type="button">Voice Chat starten</button>
        <button id="muteBtn" type="button" disabled>Mikrofon stummschalten</button>

        <section class="connect-card" aria-label="Roblox Verbindung">
          <p class="connect-title">Roblox Connect</p>
          <p class="connect-code-row">Code: <span id="connectCode">------</span></p>
          <p class="connect-url-row">Server: <span id="publicBaseUrl">wird geladen...</span></p>
          <button id="refreshCodeBtn" type="button" disabled>Neuen Code erzeugen</button>
          <p id="connectInfo" class="connect-info">
            Starte zuerst den Voice Chat, dann erscheint hier dein Zufallscode.
          </p>
        </section>

        <p class="meta">Online: <span id="onlineCount">0</span></p>

        <p class="hint">
          Bewegung: <span class="mono">WASD</span> oder <span class="mono">Pfeiltasten</span>
        </p>
      </section>

      <section class="map-wrap" aria-label="Spielerkarte">
        <div id="map" class="map"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
